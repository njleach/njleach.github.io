<head>
  <link href="http://gmpg.org/xfn/11" rel="profile">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>
    {% if page.title == "Home" %}
      {{ site.title }} &middot; {{ site.tagline }}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <!-- CSS -->

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/mobile.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/large_format.css">

  <!-- <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/poole.css"> -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/syntax.css">
  <!-- <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/hyde.css"> -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="logo1" sizes="144x144" href="{{ site.baseurl }}/assets/logo1.png">
  <link rel="shortcut icon" type="image/x-icon" href="{{ site.baseurl }}/assets/favicon.ico">

  <script src="https://kit.fontawesome.com/c90fdb3395.js" crossorigin="anonymous"></script>

  <!-- JS -->
  <script type="text/javascript" src="{{ site.baseurl }}/assets/js/mobileMenu.js"></script>

  <!-- MathJax -->
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-AMS_CHTML"></script>

  <!-- Google analytics  -->
  {% if site.google_analytics and jekyll.environment == 'production' %}
  {% include analytics.html %}
  {% endif %}

  <!-- RSS -->
  <!-- <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml"> -->
</head>
